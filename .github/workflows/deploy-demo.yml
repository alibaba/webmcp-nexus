name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/demo/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (SDK + plugins)
        run: |
          pnpm --filter webmcp-nexus-core build
          pnpm --filter webmcp-nexus-sdk build
          pnpm --filter vite-plugin-webmcp-nexus build

      - name: Build demo with GitHub Pages base path
        env:
          DEMO_BASE: /${{ github.event.repository.name }}/
        run: pnpm --filter webmcp-nexus-demo build

      - name: Add SPA 404 fallback
        run: cp apps/demo/dist/index.html apps/demo/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
